name: Release Binary

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Build binary
        run: pyinstaller --clean --onefile packaging/llm-benchmark.spec

      - name: Prepare artifact
        run: |
          TAG="${GITHUB_REF_NAME}"
          NAME="llm-benchmark-${TAG}-linux-x86_64"
          mv dist/llm-benchmark "$NAME"
          sha256sum "$NAME" > "$NAME.sha256"

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            llm-benchmark-*-linux-x86_64
            llm-benchmark-*-linux-x86_64.sha256
