name: Build Windows Portable ZIP

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows-bundle:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install backend dependencies
        run: uv sync

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Build PyInstaller bundle
        run: uv run --with pyinstaller pyinstaller packaging/windows/prism-llm-eval.spec --noconfirm

      - name: Determine artifact name
        shell: pwsh
        run: |
          $version = if ($env:GITHUB_REF_TYPE -eq 'tag') { $env:GITHUB_REF_NAME } else { "sha-$($env:GITHUB_SHA.Substring(0, 7))" }
          $basename = "prism-llm-eval-$version-windows-x86_64"
          "ARCHIVE_BASENAME=$basename" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Archive portable ZIP and SHA256
        shell: pwsh
        run: |
          $zipPath = "dist/$env:ARCHIVE_BASENAME.zip"
          $hashPath = "$zipPath.sha256"
          Compress-Archive -Path dist/prism-llm-eval/* -DestinationPath $zipPath -Force
          $hash = (Get-FileHash -Algorithm SHA256 $zipPath).Hash.ToLower()
          "$hash  $([System.IO.Path]::GetFileName($zipPath))" | Out-File -FilePath $hashPath -Encoding ascii

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_BASENAME }}
          path: |
            dist/${{ env.ARCHIVE_BASENAME }}.zip
            dist/${{ env.ARCHIVE_BASENAME }}.zip.sha256

      - name: Upload release asset
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ env.ARCHIVE_BASENAME }}.zip
            dist/${{ env.ARCHIVE_BASENAME }}.zip.sha256
